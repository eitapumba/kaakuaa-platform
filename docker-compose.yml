version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kaakuaa-db
    environment:
      POSTGRES_USER: kaakuaa
      POSTGRES_PASSWORD: kaakuaa123
      POSTGRES_DB: kaakuaa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaakuaa"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kaakuaa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
